name: Validate Machine Surfaces

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/validate.yml'
      - 'integrations.json'
      - 'integrations.schema.json'
      - 'acp/**'
      - 'mcp/**'
      - 'micro-ecf/**'
      - 'harness-core/**'
      - 'coinbase-agentic-wallets/**'
      - 'x402/**'
      - 'zoneless/**'
      - 'scripts/**'
      - 'docs/**'
      - 'examples/governed-research-agent/**'
      - 'examples/agoragentic-growth/**'
      - 'test/**'
      - '*/README.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'package.json'
      - 'llms.txt'
      - 'llms-full.txt'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate MCP package
        working-directory: mcp
        run: |
          npm ci --omit=dev
          npm run check
          npm test
          npm audit --omit=dev --audit-level=high
          npm pack --dry-run

      - name: Validate Micro ECF package
        working-directory: micro-ecf
        run: |
          npm test
          npm run check
          npm pack --dry-run

      - name: Validate Harness Core package
        working-directory: harness-core
        run: |
          npm test
          npm pack --dry-run

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate integrations.json against schema
        run: ajv validate -s integrations.schema.json -d integrations.json --all-errors --spec=draft2020 -c ajv-formats

      - name: Validate integrations.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('integrations.json','utf8')); console.log('✅ integrations.json is valid JSON')"

      - name: Verify integrations machine surfaces
        run: node scripts/verify-integrations-json.js

      - name: Verify documentation links and anchors
        run: node scripts/verify-doc-links.mjs

      - name: Test documentation link checker
        run: node --test test/verify-doc-links.test.mjs

      - name: Test governed research agent example
        run: node --test examples/governed-research-agent/test/*.test.mjs

      - name: Verify Hermes Agent bridge
        run: node hermes-agent/verify-hermes-agent.mjs

      - name: Check all integration paths exist
        run: |
          node -e "
            const idx = JSON.parse(require('fs').readFileSync('integrations.json','utf8'));
            const fs = require('fs');
            let failed = false;
            for (const i of idx.integrations) {
              if (!fs.existsSync(i.path)) {
                console.error('❌ Missing: ' + i.path + ' (integration: ' + i.id + ')');
                failed = true;
              } else {
                console.log('✅ ' + i.path);
              }
            }
            if (failed) process.exit(1);
            console.log('All ' + idx.integrations.length + ' integration paths verified.');
          "

      - name: Check per-framework READMEs exist
        run: |
          node -e "
            const idx = JSON.parse(require('fs').readFileSync('integrations.json','utf8'));
            const fs = require('fs');
            let missing = [];
            for (const i of idx.integrations) {
              const dir = i.path.split('/')[0];
              const readme = dir + '/README.md';
              if (!fs.existsSync(readme)) {
                missing.push(readme + ' (for ' + i.id + ')');
              }
            }
            if (missing.length > 0) {
              console.error('❌ Missing per-framework READMEs:');
              missing.forEach(m => console.error('  - ' + m));
              process.exit(1);
            }
            console.log('✅ All per-framework READMEs present');
          "

      - name: Check required root files exist
        run: |
          for f in integrations.json integrations.schema.json AGENTS.md SKILL.md llms.txt llms-full.txt CITATION.cff CHANGELOG.md CONTRIBUTING.md SECURITY.md CODEOWNERS LICENSE README.md; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              exit 1
            fi
            echo "✅ $f"
          done

      - name: Validate CITATION.cff
        run: |
          node -e "
            const yaml = require('fs').readFileSync('CITATION.cff','utf8');
            if (!yaml.includes('cff-version:')) { console.error('❌ CITATION.cff missing cff-version'); process.exit(1); }
            if (!yaml.includes('title:')) { console.error('❌ CITATION.cff missing title'); process.exit(1); }
            console.log('✅ CITATION.cff has required fields');
          "

      - name: Check tool IDs follow naming convention
        run: |
          node -e "
            const idx = JSON.parse(require('fs').readFileSync('integrations.json','utf8'));
            let bad = [];
            for (const t of idx.tools) {
              if (!t.id.startsWith('agoragentic_')) {
                bad.push(t.id);
              }
            }
            if (bad.length > 0) {
              console.error('❌ Tool IDs must start with agoragentic_:', bad);
              process.exit(1);
            }
            console.log('✅ All ' + idx.tools.length + ' tool IDs follow naming convention');
          "

      - name: Verify ACP adapter
        run: node scripts/verify-acp.js

      - name: Verify Rust framework public sync
        run: node scripts/verify-rust-framework-public-sync.js

      - name: Test growth example validator
        run: node --test test/validate-growth-examples.test.mjs

      - name: Validate growth-generated examples
        run: node scripts/validate-growth-examples.mjs --base origin/main

      - name: Summary
        run: |
          echo "=== Machine Surface Validation Complete ==="
          echo "integrations.json: validated against schema"
          echo "Integration paths: all verified"
          echo "Per-framework READMEs: all present"
          echo "Root files: all present"
          echo "CITATION.cff: valid"
          echo "Tool naming: consistent"

  payment-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 24 for native TypeScript contract tests
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Test payment safety contracts
        run: node --experimental-strip-types --test test/payment-safety-contracts.test.mjs
      - name: Test Solana payment safety contracts
        run: node --experimental-strip-types --test test/solana-payment-safety.test.mjs
      - name: Run Solana no-funds demo
        run: node examples/agoragentic-growth/2026-06-21-solana-x402-paid-call-adapter-demo-mjs-c10944a6cc/solana_x402_paid_call_adapter_demo.mjs
      - name: Test x402 buyer demo preflight behavior
        run: node --test test/x402-buyer-demo-preflight.test.mjs

  adapter-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 24 for TypeScript syntax checks
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Test forked conformance agent
        run: node --test test/adapter-conformance-agent.test.mjs
      - name: Test framework adapter contracts
        run: node --test test/framework-adapter-contracts.test.mjs
      - name: Validate every integration offline
        run: node scripts/adapter-conformance-agent.mjs --jobs 4 --report "${RUNNER_TEMP}/adapter-conformance-report.json"
      - name: Upload conformance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adapter-conformance-${{ github.sha }}
          path: ${{ runner.temp }}/adapter-conformance-report.json
          if-no-files-found: error
          retention-days: 30
