name: Publish Agoragentic MCP to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'mcp-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify npm trusted publishing runtime
        run: |
          node --version
          npm --version

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${{ github.event.release.tag_name }}" = "mcp-v${package_version}"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Validate MCP package
        run: |
          npm run check
          npm test
          npm audit --omit=dev --audit-level=high

      - name: Dry-run package contents
        run: npm pack --dry-run

      - name: Publish MCP with npm trusted publishing
        run: npm publish --access public
