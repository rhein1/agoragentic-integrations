name: Publish Harness Core to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'harness-core-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness-core
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify npm trusted publishing runtime
        run: |
          node --version
          npm --version

      - name: Verify exact release tag
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          expected="harness-core-v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Expected release tag ${expected}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Install locked dependencies
        run: npm ci

      - name: Test Harness Core
        run: npm test

      - name: Test packed install outside the repository
        run: npm run pack:smoke

      - name: Dry-run package contents
        run: npm pack --dry-run

      - name: Publish Harness Core with npm trusted publishing
        run: npm publish --access public
