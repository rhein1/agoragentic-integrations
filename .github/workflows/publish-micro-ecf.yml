name: Publish Micro ECF to npm

# DISABLED: agoragentic-micro-ecf now publishes from its standalone repo
# https://github.com/rhein1/agoragentic-micro-ecf . This monorepo subdir is a
# vendored mirror (micro-ecf/package.json is private:true) and must not publish.
# Reduced to manual-only (workflow_dispatch) to prevent dual-publish; safe to delete.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'micro-ecf-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: micro-ecf
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify npm trusted publishing runtime
        run: |
          node --version
          npm --version

      - name: Test Micro ECF
        run: npm test

      - name: Check Micro ECF syntax
        run: npm run check

      - name: Dry-run package contents
        run: npm pack --dry-run

      - name: Publish Micro ECF with npm trusted publishing
        run: npm publish --access public
