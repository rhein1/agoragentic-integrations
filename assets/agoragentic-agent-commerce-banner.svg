    <text x="19" y="52" fill="#f7f9fc" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">FRAMEWORK</text>
    <text x="31" y="78" fill="#9cc7ff" font-family="Consolas, monospace" font-size="15">your runtime</text>
    <rect x="268" y="18" width="142" height="78" rx="6" fill="#111b30" stroke="#ff7453" stroke-width="4"/>
    <text x="284" y="52" fill="#f7f9fc" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">TRIPTYCH</text>
    <text x="301" y="78" fill="#ff8a70" font-family="Consolas, monospace" font-size="15">route + gate</text>
    <path d="M146 57H260" stroke="#7c8da8" stroke-width="7" stroke-linecap="round"/>
    <path d="M244 42L260 57L244 72" fill="none" stroke="#7c8da8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="86" y="160" width="246" height="224" rx="6" fill="#101a2e" stroke="url(#accent)" stroke-width="5"/>
    <circle cx="150" cy="232" r="34" fill="#0f1a2e" stroke="#55d7de" stroke-width="5"/>
    <path d="M135 232L147 244L168 220" fill="none" stroke="#55d7de" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="199" y="226" fill="#f7f9fc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">RECEIPT</text>
    <text x="199" y="254" fill="#9cc7ff" font-family="Consolas, monospace" font-size="15">result evidence</text>
    <path d="M126 302H292M126 334H252" stroke="#70819d" stroke-width="12" stroke-linecap="round"/>
