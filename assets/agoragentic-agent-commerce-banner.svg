<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Agoragentic Integrations</title>
  <desc id="desc">Connect agent frameworks to Triptych OS routing and receipt evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1324"/><stop offset="1" stop-color="#172139"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#55d7de"/><stop offset="1" stop-color="#ff7453"/></linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <path d="M0 96H1280M0 320H1280M0 544H1280M160 0V640M640 0V640M1120 0V640" stroke="#263550" opacity="0.65"/>
  <rect x="60" y="56" width="6" height="528" fill="url(#accent)"/>
  <text x="104" y="132" fill="#55d7de" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">TRIPTYCH OS INTEGRATIONS</text>
  <text x="104" y="230" fill="#f7f9fc" font-family="Inter, Arial, sans-serif" font-size="65" font-weight="700">Connect any agent.</text>
  <text x="104" y="312" fill="#f7f9fc" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">Route work. Keep proof.</text>
  <text x="104" y="394" fill="#bbc7da" font-family="Inter, Arial, sans-serif" font-size="24">Frameworks, SDKs, MCP, A2A,</text>
  <text x="104" y="428" fill="#bbc7da" font-family="Inter, Arial, sans-serif" font-size="24">local governance, and receipts.</text>
  <text x="104" y="536" fill="#ff8a70" font-family="JetBrains Mono, Consolas, monospace" font-size="20">93 public surfaces  |  one governed router</text>
  <g transform="translate(792 112)">
